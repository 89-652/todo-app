<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はじめてのWebサイト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>はじめてのWebサイト</h1>
    <p>HTML / CSS / JavaScript で作ったシンプルなページです。</p>
  </header>

  <main>
    <section class="card">
      <h2>自己紹介</h2>
      <p>こんにちは！Web制作を勉強中です。少しずつ作れるものを増やしています。</p>
    </section>

    <section class="card">
      <h2>できること</h2>
      <ul>
        <li>HTMLでページを作る</li>
        <li>CSSで色やレイアウトを整える</li>
        <li>JavaScriptで簡単な動きをつける</li>
      </ul>
    </section>

    <section class="card">
      <h2>今日のひとこと</h2>
      <p id="message">ボタンを押してメッセージを表示しましょう！</p>
      <button id="messageButton">メッセージを表示</button>
    </section>
  </main>

  <footer>
    <small>© 2026 Beginner Web Site</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
